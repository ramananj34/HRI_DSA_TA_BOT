const pages=document.getElementById('pages');

data.forEach((sections,pi)=>{
  let d=document.createElement('div');
  d.className='page'+(pi===0?' active':'');
  let html='<div class="page-title">'+titles[pi]+'</div>';
  sections.forEach(([name,rows])=>{
    html+='<div class="section"><h2>'+esc(name)+'</h2>';
    rows.forEach(([label,text,goto])=>{
      const isEscape=label.includes('ESCAPE');
      if(text){
        let t=tts(text);
        html+='<div class="box'+(isEscape?' escape':'')+'" onclick="cp(this)" data-tts="'+escAttr(t)+'"><b>'+esc(label)+':</b> '+esc(text)+'</div>';
      } else {
        html+='<div class="note"><b>'+esc(label)+'</b></div>';
      }
      if(goto) html+='<span class="goto">'+esc(goto)+'</span>';
    });
    html+='</div>';
  });
  d.innerHTML=html;
  pages.appendChild(d);
});

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escAttr(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function tts(s){
  return s
    .replace(/\[([^\]]+)\]/g,function(m,inner){
      let items=inner.split(',').map(x=>x.trim());
      if(items.length>1&&items.every(x=>x.length<20)) return items.join(', ');
      return m;
    })
    .replace(/\((\d+),(\d+)\)/g,'$1 and $2')
    .replace(/dp\[([^\]]+)\]/g,'dp of $1')
    .replace(/arr\[([^\]]+)\]/g,'arr of $1')
    .replace(/nums\[([^\]]+)\]/g,'nums of $1')
    .replace(/max\(([^)]+)\)/g,'max of $1')
    .replace(/ = /g,' equals ')
    .replace(/ \+ /g,' plus ')
    .replace(/ \- /g,' minus ')
    .replace(/n\*\(n\+1\)\/2/g,'n times n plus 1 divided by 2')
    .replace(/n \* \(n \+ 1\) \/ 2/g,'n times n plus 1 divided by 2')
    .replace(/O\(1\)/g,'O of 1')
    .replace(/O\(n\)/g,'O of n')
    .replace(/O\(n\^2\)/g,'O of n squared')
    .replace(/O\(n squared\)/g,'O of n squared');
}

function show(i){
  document.querySelectorAll('.page').forEach((p,j)=>p.classList.toggle('active',j===i));
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
}
window.show=show;

function cp(el){
  let txt=el.getAttribute('data-tts');
  navigator.clipboard.writeText(txt);
  el.classList.add('copied');
  setTimeout(()=>el.classList.remove('copied'),400);
}
window.cp=cp;
</script>
