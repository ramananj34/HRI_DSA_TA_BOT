["If they get 0","So dp[0] = 0 and dp[1] = 0, and you start filling from dp[2] onward. Want to trace through an example?","→ WRAP-UP"],
["If confused","You need two elements to make a pair. With just one, you can't pair anything, so the best sum is 0."]]
],

["Step 3","You don't have to pair everything. You can skip elements entirely. You're just trying to pick the set of non-overlapping pairs that gives the biggest total.","→ DIAGNOSE"]]

const titles=["Direct P1: Non-Adjacent Subset","Socratic P1: Non-Adjacent Subset","Direct P2: Consecutive Pairs","Socratic P2: Consecutive Pairs"];
const pages=document.getElementById('pages');

data.forEach((sections,pi)=>{
let d=document.createElement('div');
d.className='page'+(pi===0?' active':'');
let html='<b>'+titles[pi]+'</b>';
sections.forEach(([name,rows])=>{
html+='<h2>'+name+'</h2>';
rows.forEach(([label,text,goto])=>{
if(text){
let t=tts(text);
html+='<div class="box" onclick="cp(this)" data-tts="'+escAttr(t)+'"><b>'+esc(label)+':</b> '+esc(text)+'</div>';
}else{
html+='<div class="note"><b>'+esc(label)+'</b></div>';
}
if(goto)html+='<div class="goto">'+esc(goto)+'</div>';
});
});
d.innerHTML=html;
pages.appendChild(d);
});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function tts(s){
// Convert [1, 5, 3, 4, 2] style arrays to spoken form
return s.replace(/\[([^\]]+)\]/g, function(m,inner){
// Check if it looks like a list of values (numbers or short items)
let items=inner.split(',').map(x=>x.trim());
if(items.length>1 && items.every(x=>x.length<20)){
return items.join(', ');
}
return m;
})
// Convert (5,3) style pairs to spoken form  
.replace(/\((\d+),(\d+)\)/g, '$1 and $2')
// Convert dp[i-1] style to spoken
.replace(/dp\[([^\]]+)\]/g, 'dp of $1')
.replace(/arr\[([^\]]+)\]/g, 'arr of $1')
.replace(/nums\[([^\]]+)\]/g, 'nums of $1')
// max(x, y) to "max of x, y"
.replace(/max\(([^)]+)\)/g, 'max of $1')
// Clean up = signs
.replace(/ = /g, ' equals ')
// Clean up + for addition in formulas
.replace(/ \+ /g, ' plus ');
}

function show(i){
document.querySelectorAll('.page').forEach((p,j)=>p.classList.toggle('active',j===i));
document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
}
window.show=show;

function cp(el){
let txt=el.getAttribute('data-tts');
navigator.clipboard.writeText(txt);
el.classList.add('copied');
setTimeout(()=>el.classList.remove('copied'),400);
}
window.cp=cp;
</script>
